name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${ github.event.repository.fork }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Kilo-Org/kilocode.git || echo "Remote already exists."
          git fetch upstream main

      - name: Sync main branch
        run: |
          git checkout main

          if [ "$(git rev-parse main)" = "$(git rev-parse upstream/main)" ]; then
            echo "Already up-to-date with upstream"
            exit 0
          fi

          if git merge-base --is-ancestor main upstream/main; then
            echo "Fast-forward possible, merging..."
            git merge --ff-only upstream/main
          else
            echo "Diverged, creating merge commit..."
            git merge upstream/main --no-edit --no-commit
            # GITHUB_TOKEN cannot push workflow file changes, preserve local versions
            git checkout HEAD -- .github/workflows/ || true
            git commit -m "chore: sync upstream (preserve local workflows) [auto-sync]"
          fi

          # Try push, retry without workflow changes if it fails
          if ! git push origin main 2>/dev/null; then
            echo "Push failed, retrying without workflow changes..."
            git checkout HEAD -- .github/workflows/ || true
            git commit --amend --no-edit --allow-empty || true
            git push origin main
          fi
          echo "Sync completed"
